##############################################
#  PostgreSQL — Configuración personalizada
#  Entorno: desarrollo (ajustar para producción)
###########################################
# Conexiones 
listen_addresses            = '*'      # escucha en todas las interfaces (necesario para acceso externo)
max_connections             = 100
superuser_reserved_connections = 3

# Memoria
# shared_buffers: ~25% de la RAM disponible
shared_buffers              = 128MB
work_mem                    = 8MB
maintenance_work_mem        = 64MB
# effective_cache_size: ~75% de la RAM disponible
effective_cache_size        = 512MB
temp_buffers                = 16MB

# WAL (Write-Ahead Log) 
wal_buffers                 = 16MB
min_wal_size                = 256MB
max_wal_size                = 1GB
checkpoint_completion_target = 0.9
checkpoint_warning          = 30s

# Planificador de consultas
random_page_cost            = 1.1      # 1.1 para SSD, 4.0 para HDD
effective_io_concurrency    = 200      # 200 para SSD, 2 para HDD
default_statistics_target   = 100

# Logging 
log_timezone                = UTC
log_min_duration_statement  = 1000     # ms — loguea queries lentas (≥ 1s)
log_connections             = off
log_disconnections          = off
log_lock_waits              = on
log_temp_files              = 0
log_line_prefix             = '%t [%p] %u@%d '

# Localización 
timezone                    = 'America/La_Paz'
lc_messages                 = 'C.UTF-8'
lc_monetary                 = 'C.UTF-8'
lc_numeric                  = 'C.UTF-8'
lc_time                     = 'C.UTF-8'
default_text_search_config  = 'pg_catalog.spanish'
#lc_messages                 = 'en_US.UTF-8'
#lc_monetary                 = 'en_US.UTF-8'
#lc_numeric                  = 'en_US.UTF-8'
#lc_time                     = 'en_US.UTF-8'
#default_text_search_config  = 'pg_catalog.english'

#  Seguridad 
ssl                         = off      # activar con certificados en producción
password_encryption         = scram-sha-256
